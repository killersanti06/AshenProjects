<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Botones de Descarga y Redes Sociales</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    .btn {
      display: inline-block;
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      text-decoration: none;
      border-radius: 5px;
      color: #fff;
      transition: background-color 0.3s;
    }
    .download {
      background-color: #28a745;
    }
    .download:hover {
      background-color: #218838;
    }
    .social {
      background-color: #007bff;
    }
    .social:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Descargas y Redes Sociales</h1>

  <!-- Botón de descarga -->
  <a href="archivo.zip" class="btn download" download>Descargar Archivo</a>

  <!-- Botones de redes sociales -->
  <a href="https://www.facebook.com" target="_blank" class="btn social">Facebook</a>
  <a href="https://www.twitter.com" target="_blank" class="btn social">Twitter</a>
  <a href="https://www.instagram.com" target="_blank" class="btn social">Instagram</a>
  <a href="https://www.linkedin.com" target="_blank" class="btn social">LinkedIn</a>
</body>
